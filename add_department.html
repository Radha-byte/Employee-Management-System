<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Department Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>

        body{
            background:#f4f6f9;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            background:#1e3c72;
            color:white;
            padding-top:20px;
        }

        .sidebar h3{
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#16325c;
        }

        .content{
            margin-left:260px;
            padding:30px;
        }

        .form-box{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

    <div class="sidebar">

        <h3>EMS Portal</h3>

        <a href="/admin_dashboard">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="/add_employee">
            <i class="bi bi-person-plus"></i> Add Employee
        </a>

        <a href="/view_employees">
            <i class="bi bi-people"></i> View Employees
        </a>

        <a href="/add_department">
            <i class="bi bi-building"></i> Add Department
        </a>

        <a href="/view_departments">
    <i class="bi bi-building"></i> View Departments
</a>

        <a href="/assign_task">
            <i class="bi bi-list-check"></i> Assign Task
        </a>

        <a href="/view_tasks">
    <i class="bi bi-card-checklist"></i> View Tasks
</a>

<a href="/view_leave_requests">
    <i class="bi bi-calendar-check"></i> Leave Requests
</a>

        <a href="#" onclick="confirmLogout()">
    <i class="bi bi-box-arrow-right"></i> Logout
</a>

    </div>

    <div class="content">

        <h2>Department Management</h2>

        <p class="text-muted">
            Add and Manage Organizational Departments
        </p>

        <div class="form-box mt-4">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Department Name
                    </label>

                    <input type="text"
                           name="department_name"
                           class="form-control"
                           placeholder="Enter Department Name"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Add Department

                </button>

            </form>

        </div>

    </div>

    <script>

function confirmLogout() {

    let result = confirm(
        "Are you sure you want to logout?"
    );

    if(result) {

        window.location.href = "/logout";

    }

}

</script>

</body>

</html>
