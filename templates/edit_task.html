<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>Edit Task</h2>

        <hr>

        <form method="POST">

            <div class="mb-3">

                <label>Task Title</label>

                <input
                    type="text"
                    name="task_title"
                    class="form-control"
                    value="{{ task.task_title }}"
                    required>

            </div>

            <div class="mb-3">

                <label>Description</label>

                <textarea
                    name="description"
                    class="form-control"
                    required>{{ task.description }}</textarea>

            </div>

            <div class="mb-3">

                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                    class="form-control"
                    value="{{ task.due_date }}"
                    required>

            </div>

            <div class="mb-3">

                <label>Status</label>

                <select
                    name="status"
                    class="form-control">

                    <option value="Pending"
                        {% if task.status == 'Pending' %}selected{% endif %}>
                        Pending
                    </option>

                    <option value="Completed"
                        {% if task.status == 'Completed' %}selected{% endif %}>
                        Completed
                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-success">

                Update Task

            </button>

        </form>

    </div>

</div>

</body>

</html>
