<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employee Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-container{
            width:430px;
            background:rgba(255,255,255,0.95);
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 25px rgba(0,0,0,0.3);
        }

        .login-title{
            text-align:center;
            margin-bottom:30px;
        }

        .logo-icon{
            font-size:55px;
            color:#0d6efd;
            margin-bottom:10px;
        }

        .login-title h2{
            font-weight:bold;
            color:#1e3c72;
        }

        .login-title p{
            color:gray;
            font-size:14px;
        }

        .form-control,
        .form-select{
            height:48px;
            border-radius:10px;
        }

        .btn-login{
            width:100%;
            height:48px;
            border:none;
            border-radius:10px;
            background:#0d6efd;
            color:white;
            font-weight:bold;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#084298;
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            font-size:13px;
            color:gray;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="login-title">

            <div class="logo-icon">
                <i class="bi bi-building-fill-gear"></i>
            </div>

            <h2>Employee Management System</h2>

            <p>Power Transmission Sector Management Portal</p>

        </div>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter Username"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter Password"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Select Role
                </label>

                <select name="role" class="form-select" required>

                    <option value="">
                        -- Select Role --
                    </option>

                    <option value="admin">
                        Admin
                    </option>

                    <option value="employee">
                        Employee
                    </option>

                </select>

            </div>

            <button type="submit" class="btn-login">
                Login
            </button>

        </form>

        <div class="footer-text">
            Secure Organizational Access
        </div>

    </div>

</body>

</html>
