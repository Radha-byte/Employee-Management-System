<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .container-box{
            width:70%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

    <div class="container-box">

        <h2>Edit Employee</h2>

        <hr>

        <form method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>Employee ID</label>

                    <input type="text"
                           name="employee_id"
                           value="{{ employee[1] }}"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Name</label>

                    <input type="text"
                           name="name"
                           value="{{ employee[2] }}"
                           class="form-control"
                           required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>Department</label>

                    <input type="text"
                           name="department"
                           value="{{ employee[3] }}"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Designation</label>

                    <input type="text"
                           name="designation"
                           value="{{ employee[4] }}"
                           class="form-control"
                           required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>Contact Number</label>

                    <input type="text"
                           name="contact_number"
                           value="{{ employee[5] }}"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Joining Date</label>

                    <input type="date"
                           name="joining_date"
                           value="{{ employee[6] }}"
                           class="form-control"
                           required>

                </div>

            </div>

            <div class="mb-3">

                <label>Office Location</label>

                <input type="text"
                       name="office_location"
                       value="{{ employee[7] }}"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-success">

                Update Employee

            </button>

            <a href="/view_employees"
               class="btn btn-secondary">

               Back

            </a>

        </form>

    </div>

</body>

</html>
